apiVersion: v1
kind: Secret
metadata:
  name: deepwork-secret
type: Opaque
stringData:
  DEEPWORK_SECRET_KEY: replace-me-with-a-long-random-secret
  DEEPWORK_POSTGRES_PASSWORD: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deepwork-config
data:
  DEEPWORK_DB_BACKEND: sqlite
  HOST: "0.0.0.0"
  PORT: "8000"
  DEEPWORK_DB_PATH: /data/deepwork.db
  DEEPWORK_WEEK_START: monday
  DEEPWORK_FOCUS_MINUTES: "25"
  DEEPWORK_SHORT_BREAK_MINUTES: "5"
  DEEPWORK_LONG_BREAK_MINUTES: "15"
  DEEPWORK_LONG_BREAK_INTERVAL: "4"
  DEEPWORK_POSTGRES_HOST: ""
  DEEPWORK_POSTGRES_PORT: "5432"
  DEEPWORK_POSTGRES_DATABASE: ""
  DEEPWORK_POSTGRES_USER: ""
  DEEPWORK_POSTGRES_MAINTENANCE_DATABASE: postgres
  DEEPWORK_POSTGRES_SSLMODE: prefer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deepwork-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepwork
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepwork
  template:
    metadata:
      labels:
        app: deepwork
    spec:
      containers:
        - name: deepwork
          image: deepwork:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: deepwork-config
            - secretRef:
                name: deepwork-secret
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: deepwork-data
---
apiVersion: v1
kind: Service
metadata:
  name: deepwork
spec:
  selector:
    app: deepwork
  ports:
    - name: http
      port: 8000
      targetPort: http
