apiVersion: v1
kind: ConfigMap
metadata:
  name: deepwork-personal-config
data:
  DEEPWORK_PERSONAL_MODE: "1"
  DEEPWORK_DB_BACKEND: sqlite
  DEEPWORK_DB_PATH: /data/deepwork.db
  HOST: "0.0.0.0"
  PORT: "8000"
  DEEPWORK_WEEK_START: monday
  DEEPWORK_FOCUS_MINUTES: "25"
  DEEPWORK_SHORT_BREAK_MINUTES: "5"
  DEEPWORK_LONG_BREAK_MINUTES: "15"
  DEEPWORK_LONG_BREAK_INTERVAL: "4"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deepwork-personal-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepwork-personal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepwork-personal
  template:
    metadata:
      labels:
        app: deepwork-personal
    spec:
      containers:
        - name: deepwork
          image: yavarkhodadadi/deep-work-4dx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: deepwork-personal-config
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: deepwork-personal-data
---
apiVersion: v1
kind: Service
metadata:
  name: deepwork-personal
spec:
  selector:
    app: deepwork-personal
  ports:
    - name: http
      port: 8000
      targetPort: http
